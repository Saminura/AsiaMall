<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Корзина</title>

    <style>

        body{
            font-family:Arial;
            background:#f3f4f6;
            padding:40px;
        }

        .box{
            max-width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
        }

        .item{
            display:flex;
            justify-content:space-between;
            padding:20px 0;
            border-bottom:1px solid #eee;
        }

        .total{
            margin-top:30px;
            font-size:28px;
            font-weight:bold;
        }

        .back{
            display:inline-block;
            margin-top:20px;
            background:black;
            color:white;
            padding:12px 20px;
            border-radius:10px;
            text-decoration:none;
        }

    </style>
</head>
<body>

    <div class="box">

        <h1>🛒 Корзина</h1>

        {% for item in cart_items %}

        <div class="item">

            <div>
                {{ item.product.name }}
            </div>

            <div>
                {{ item.quantity }} шт
            </div>

        </div>

        {% endfor %}

        <div class="total">
            Итого: {{ total }} сом
        </div>

        <a href="/" class="back">
            ← Назад
        </a>

    </div>

</body>
</html>
