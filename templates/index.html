<h1>Корзина</h1>

{% for item in cart_items %}
    <p>
        {{ item.product.name }} —
        {{ item.quantity }} шт —
        {{ item.item_total }} сом
        <a href="/remove/{{ item.product.id }}/">Удалить</a>
    </p>
{% endfor %}

<hr>

<h3>Итого: {{ total_price }} сом</h3>
<br>
<a href="/clear-cart/">Очистить корзину</a>
